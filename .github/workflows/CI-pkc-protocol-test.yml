# test plebbit-protocol-test repo which are independent tests
# to make sure the protocol never changes
name: CI pkc-protocol-test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # move pkc-js (working dir) to temp folder
      - run: cp -r . ../pkc-js-tmp && rm -fr `ls -A1`
      # clone plebbit-protocol-test repo to working dir
      - run: git clone https://github.com/plebbit/plebbit-protocol-test.git .
      # log the current commit for debugging
      - run: git log -n 1
      # move pkc-js back to working dir in a sub folder
      - run: mv ../pkc-js-tmp pkc-js
      # build the latest pkc-js dist folder
      - run: cd pkc-js && npm ci
      - run: cd pkc-js && npm run build
      - run: rm -fr pkc-js/node_modules
      # install plebbit-protocol-test
      - run: npm i
      # install latest pkc-js using add ./pkc-js (local folder module)
      - run: npm remove @pkcprotocol/pkc-js
      - run: npm i ./pkc-js
      # install playwright browsers
      - run: npx playwright install --with-deps chromium firefox
      # disable hosts we shouldn't use
      - run: sudo echo "255.255.255.255 cloudflare-ipfs.com" | sudo tee -a /etc/hosts
      - run: sudo echo "255.255.255.255 pubsubprovider.xyz" | sudo tee -a /etc/hosts
      # test
      - run: DEBUG="pkc-js*,pkc-react-hooks*" TESTING=1 yarn test:server & yarn test:server:wait-on
      - run: DEBUG="pkc-js*,pkc-react-hooks*" npm run test
      - run: DEBUG="pkc-js*,pkc-react-hooks*" npm run test:browser
