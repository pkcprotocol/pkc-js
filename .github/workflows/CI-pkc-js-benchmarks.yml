# run and save benchmarks for @pkc/pkc-js in pkcprotocol/pkc-js-benchmarks
name: CI pkc-js-benchmarks

# only run if the CI passes or if manually dispatched
on:
  workflow_run:
    workflows:
      - 'CI build'
    types:
      - 'completed'
  workflow_dispatch:

jobs:
  benchmark:
    # only run if the CI passes or if manually dispatched
    if: ${{github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')}}
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - run: sudo apt install -y xvfb
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # set up ssh (needed to commit reports)
      - name: set up ssh
        run: |
          mkdir -p ~/.ssh
          echo "${{secrets.PKC_JS_BENCHMARKS_DEPLOY_KEY}}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # clone pkc-js-benchmarks
      - run: git clone git@github.com:pkcprotocol/pkc-js-benchmarks.git ../pkc-js-benchmarks
      # log the current commit for debugging
      - run: |
          git log -n 1
        working-directory: ../pkc-js-benchmarks

      # prepare pkc-js for installing
      - run: npm ci
      - run: npm run build

      # install latest pkc-js using add ./pkc-js (local folder module)
      - name: install and build pkc-js-benchmarks
        run: |
          npm uninstall @pkc/pkc-js
          npm install ../pkc-js
          rm -rf ../pkc-js/package-lock.json
          npm install
          npx playwright install chromium
        working-directory: ../pkc-js-benchmarks

      # benchmark
      - name: run benchmarks
        run: |
          node start
        working-directory: ../pkc-js-benchmarks

      # print report for debugging
      # save report as <commit-hash>.txt
      # save report as <commit-hash>.json (with extra prop pkcJsCommitHash)
      # save all reports as all.json (ordered by timestamp)
      - name: print report
        run: |
          node lib/print-report
          mkdir -p reports
          node lib/print-report > reports/${{github.sha}}.txt
          jq --arg sha "$SHA" 'map(. + {pkcJsCommitHash: $sha})' report.json > reports/$SHA.json
          rm -f reports/all.json
          jq -s -c 'sort_by(.[0].timestamp) | reverse' reports/*.json > reports/all.json
        working-directory: ../pkc-js-benchmarks
        env:
          SHA: ${{github.sha}}

      # commit and push report
      - name: commit report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git add reports/
          git commit -m "add benchmark report for ${{github.sha}}" || echo "no reports to commit"
          git push
        working-directory: ../pkc-js-benchmarks
